name: jesb
region: nyc
services:
  - name: backend
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_OWNER/YOUR_GITHUB_REPO
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: AUTH0_DOMAIN
        scope: RUN_TIME
        value: REPLACE_ME
      - key: AUTH0_CLIENT_ID
        scope: RUN_TIME
        value: REPLACE_ME
      - key: AUTH0_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: APP_BASE_URL
        scope: RUN_TIME
        value: https://BACKEND_APP_DOMAIN
      - key: FRONTEND_BASE_URL
        scope: RUN_TIME
        value: https://FRONTEND_APP_DOMAIN
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_MANAGED_POSTGRES_URL
      - key: CORS_ALLOWED_ORIGINS
        scope: RUN_TIME
        value: https://FRONTEND_APP_DOMAIN

  - name: frontend
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_OWNER/YOUR_GITHUB_REPO
    source_dir: treeHacks
    dockerfile_path: Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        value: https://BACKEND_APP_DOMAIN
